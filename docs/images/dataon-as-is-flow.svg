<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="1100" height="520" fill="#fafafa"/>
  <text x="24" y="32" fill="#111827" font-size="18" font-weight="700">AS-IS — 수동 협의·중복 입력 기반 수집 흐름</text>
  <text x="24" y="52" fill="#6b7280" font-size="12">담당자·작업자 의존 / 엑셀 협의 / 연구자 중복 입력</text>

  <!-- ──── 상단 트랙: 기관 연계 ──── -->
  <text x="24" y="92" fill="#6b7280" font-size="12" font-weight="700">[ 기관 연계 ]</text>

  <!-- 1. 기관 담당자 -->
  <rect x="24" y="104" width="160" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="104" y="128" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">① 기관 담당자</text>
  <text x="104" y="148" fill="#6b7280" font-size="11" text-anchor="middle">요건 정리</text>
  <text x="104" y="164" fill="#6b7280" font-size="11" text-anchor="middle">엑셀 양식 작성</text>

  <!-- arrow -->
  <line x1="184" y1="143" x2="218" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="218,143 210,138 210,148" fill="#9ca3af"/>

  <!-- 2. 작업자 협의 -->
  <rect x="222" y="104" width="160" height="78" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="302" y="128" fill="#7f1d1d" font-size="13" font-weight="700" text-anchor="middle">② DataON 작업자</text>
  <text x="302" y="148" fill="#991b1b" font-size="11" text-anchor="middle">전화·메일 협의</text>
  <text x="302" y="164" fill="#991b1b" font-size="11" text-anchor="middle">반복 검토</text>

  <line x1="382" y1="143" x2="416" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="416,143 408,138 408,148" fill="#9ca3af"/>

  <!-- 3. 컬렉션 정의 -->
  <rect x="420" y="104" width="160" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="500" y="128" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">③ 컬렉션 정의</text>
  <text x="500" y="148" fill="#6b7280" font-size="11" text-anchor="middle">담당자 설정</text>
  <text x="500" y="164" fill="#6b7280" font-size="11" text-anchor="middle">메타데이터 형식</text>

  <line x1="580" y1="143" x2="614" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="614,143 606,138 606,148" fill="#9ca3af"/>

  <!-- 4. 메타데이터 매핑 -->
  <rect x="618" y="104" width="160" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="698" y="128" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">④ 메타데이터 매핑</text>
  <text x="698" y="148" fill="#6b7280" font-size="11" text-anchor="middle">엑셀 → XML 스키마</text>
  <text x="698" y="164" fill="#6b7280" font-size="11" text-anchor="middle">필수/옵션 정의</text>

  <line x1="778" y1="143" x2="812" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="812,143 804,138 804,148" fill="#9ca3af"/>

  <!-- 5. OpenAPI 키 -->
  <rect x="816" y="104" width="160" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="896" y="128" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">⑤ OpenAPI 키</text>
  <text x="896" y="148" fill="#6b7280" font-size="11" text-anchor="middle">발급·등록</text>
  <text x="896" y="164" fill="#6b7280" font-size="11" text-anchor="middle">연계 테스트</text>

  <!-- Pain point bubble -->
  <rect x="24" y="200" width="952" height="44" rx="6" fill="#fef2f2" stroke="#ef4444"/>
  <text x="44" y="220" fill="#7f1d1d" font-size="12" font-weight="700">⚠ 문제점</text>
  <text x="104" y="220" fill="#7f1d1d" font-size="12">기관마다 협의가 새로 시작 · 평균 2~4주 소요 · 작업자가 변경되면 노하우 단절 · 엑셀-XML 변환 오류</text>
  <text x="44" y="236" fill="#7f1d1d" font-size="11">           동일 기관이라도 컬렉션 변경 시 다시 협의 필요 — 확장성 부족</text>

  <!-- 분리선 -->
  <line x1="24" y1="266" x2="1076" y2="266" stroke="#e5e7eb" stroke-dasharray="4 4"/>

  <!-- ──── 하단 트랙: 연구자 등록 ──── -->
  <text x="24" y="294" fill="#6b7280" font-size="12" font-weight="700">[ 연구자 데이터 등록 ]</text>

  <!-- 연구자 -->
  <rect x="24" y="306" width="160" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="104" y="330" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">연구자</text>
  <text x="104" y="350" fill="#6b7280" font-size="11" text-anchor="middle">데이터 보유</text>
  <text x="104" y="366" fill="#6b7280" font-size="11" text-anchor="middle">메타데이터 파편적</text>

  <!-- 분기 -->
  <line x1="184" y1="345" x2="218" y2="316" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="218,316 210,316 213,323" fill="#9ca3af"/>
  <line x1="184" y1="345" x2="218" y2="374" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="218,374 213,367 210,374" fill="#9ca3af"/>

  <!-- 경로 A: 기관 리포지터리 -->
  <rect x="222" y="284" width="180" height="68" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="312" y="306" fill="#7f1d1d" font-size="12" font-weight="700" text-anchor="middle">경로 A · 기관 리포지터리</text>
  <text x="312" y="324" fill="#991b1b" font-size="11" text-anchor="middle">로그인 → 등록 양식</text>
  <text x="312" y="340" fill="#991b1b" font-size="11" text-anchor="middle">필드 약 40개 수기 입력</text>

  <!-- 경로 B: DataON 직접 -->
  <rect x="222" y="368" width="180" height="68" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="312" y="390" fill="#7f1d1d" font-size="12" font-weight="700" text-anchor="middle">경로 B · DataON 직접 등록</text>
  <text x="312" y="408" fill="#991b1b" font-size="11" text-anchor="middle">DataON 사이트 접속</text>
  <text x="312" y="424" fill="#991b1b" font-size="11" text-anchor="middle">동일 정보 재입력</text>

  <line x1="402" y1="318" x2="436" y2="318" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="436,318 428,313 428,323" fill="#9ca3af"/>
  <line x1="402" y1="402" x2="436" y2="402" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="436,402 428,397 428,407" fill="#9ca3af"/>

  <!-- 등록 양식 -->
  <rect x="440" y="284" width="200" height="152" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="540" y="308" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">연구데이터 등록 양식</text>
  <line x1="460" y1="318" x2="620" y2="318" stroke="#e5e7eb"/>
  <text x="460" y="334" fill="#6b7280" font-size="10">• 컬렉션 선택 / 과제정보</text>
  <text x="460" y="350" fill="#6b7280" font-size="10">• 책임자·참여자·기관</text>
  <text x="460" y="366" fill="#6b7280" font-size="10">• 제목·설명·키워드 (한/영)</text>
  <text x="460" y="382" fill="#6b7280" font-size="10">• 기간·수집지역·좌표</text>
  <text x="460" y="398" fill="#6b7280" font-size="10">• 라이선스·엠바고</text>
  <text x="460" y="414" fill="#6b7280" font-size="10">• 파일 업로드·해시·포맷</text>
  <text x="460" y="430" fill="#6b7280" font-size="10">• 관련 논문·DOI·ISSN</text>

  <line x1="640" y1="360" x2="674" y2="360" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="674,360 666,355 666,365" fill="#9ca3af"/>

  <!-- 검토/승인 -->
  <rect x="678" y="306" width="160" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="758" y="330" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">검토·승인</text>
  <text x="758" y="350" fill="#6b7280" font-size="11" text-anchor="middle">담당자 수기 검토</text>
  <text x="758" y="366" fill="#6b7280" font-size="11" text-anchor="middle">반려 시 재작업</text>

  <line x1="838" y1="345" x2="872" y2="345" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="872,345 864,340 864,350" fill="#9ca3af"/>

  <!-- DataON 등록 -->
  <rect x="876" y="306" width="100" height="78" rx="8" fill="#fff" stroke="#9ca3af" stroke-width="2"/>
  <text x="926" y="330" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">DataON</text>
  <text x="926" y="350" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">수집 완료</text>
  <circle cx="926" cy="370" r="6" fill="#10b981"/>

  <!-- Pain point bubble 2 -->
  <rect x="24" y="456" width="952" height="44" rx="6" fill="#fef2f2" stroke="#ef4444"/>
  <text x="44" y="476" fill="#7f1d1d" font-size="12" font-weight="700">⚠ 문제점</text>
  <text x="104" y="476" fill="#7f1d1d" font-size="12">연구자 입력 부담 (필드 40여 개, 한/영 병기) · 동일 정보 중복 입력 · 메타데이터 누락·오기재 빈발</text>
  <text x="44" y="492" fill="#7f1d1d" font-size="11">           검토자 수기 검수 — 품질·일관성 보장 어려움</text>
</svg>
