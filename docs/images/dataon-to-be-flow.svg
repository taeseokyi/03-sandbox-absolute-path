<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="1100" height="560" fill="#fafafa"/>
  <text x="24" y="32" fill="#111827" font-size="18" font-weight="700">TO-BE — AI 에이전트 적용 자동화 흐름</text>
  <text x="24" y="52" fill="#6b7280" font-size="12">담당자 요건 → 에이전트가 컬렉션·매핑·OpenAPI 자동 구성 / 연구자 URL·문서 → 에이전트가 등록 양식 자동 채움</text>

  <!-- AI agent core (center) -->
  <rect x="380" y="232" width="340" height="100" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="262" fill="#1e3a8a" font-size="15" font-weight="700" text-anchor="middle">DataON AI 에이전트 플랫폼</text>
  <text x="550" y="282" fill="#1e40af" font-size="11" text-anchor="middle">deepagents 샌드박스 · LangGraph · MCP</text>
  <rect x="396" y="294" width="100" height="26" rx="13" fill="#fff" stroke="#2563eb"/>
  <text x="446" y="312" fill="#1e3a8a" font-size="11" font-weight="600" text-anchor="middle">기관 연계 Agent</text>
  <rect x="504" y="294" width="100" height="26" rx="13" fill="#fff" stroke="#2563eb"/>
  <text x="554" y="312" fill="#1e3a8a" font-size="11" font-weight="600" text-anchor="middle">등록 자동 Agent</text>
  <rect x="612" y="294" width="100" height="26" rx="13" fill="#fff" stroke="#2563eb"/>
  <text x="662" y="312" fill="#1e3a8a" font-size="11" font-weight="600" text-anchor="middle">품질 검토 Agent</text>

  <!-- ──── 상단: 기관 연계 흐름 ──── -->
  <text x="24" y="92" fill="#6b7280" font-size="12" font-weight="700">[ 기관 연계 — 챗봇형 셋업 ]</text>

  <rect x="24" y="104" width="200" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="124" y="128" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">기관 담당자</text>
  <text x="124" y="148" fill="#6b7280" font-size="11" text-anchor="middle">"우리 기관 컬렉션을</text>
  <text x="124" y="164" fill="#6b7280" font-size="11" text-anchor="middle">아래 형식으로 만들어줘"</text>

  <line x1="224" y1="143" x2="258" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="258,143 250,138 250,148" fill="#9ca3af"/>

  <!-- 자연어 요건 -->
  <rect x="262" y="104" width="200" height="78" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="362" y="128" fill="#0c4a6e" font-size="13" font-weight="700" text-anchor="middle">자연어 요건 + 첨부</text>
  <text x="362" y="148" fill="#075985" font-size="11" text-anchor="middle">엑셀·PDF·기관 URL</text>
  <text x="362" y="164" fill="#075985" font-size="11" text-anchor="middle">대화형 보완 질문</text>

  <line x1="462" y1="143" x2="496" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="496,143 488,138 488,148" fill="#9ca3af"/>

  <!-- 에이전트 자동 작업 -->
  <rect x="500" y="104" width="200" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="600" y="128" fill="#14532d" font-size="13" font-weight="700" text-anchor="middle">🤖 자동 매핑·검증</text>
  <text x="600" y="148" fill="#166534" font-size="11" text-anchor="middle">메타데이터 형식 생성</text>
  <text x="600" y="164" fill="#166534" font-size="11" text-anchor="middle">담당자 1회 컨펌</text>

  <line x1="700" y1="143" x2="734" y2="143" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="734,143 726,138 726,148" fill="#9ca3af"/>

  <!-- 자동 등록 -->
  <rect x="738" y="104" width="200" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="838" y="128" fill="#14532d" font-size="13" font-weight="700" text-anchor="middle">컬렉션·OpenAPI 자동 생성</text>
  <text x="838" y="148" fill="#166534" font-size="11" text-anchor="middle">DataON Admin API 호출</text>
  <text x="838" y="164" fill="#166534" font-size="11" text-anchor="middle">연계 테스트 수행</text>

  <!-- 화살표 below 기관 연계 → AI 플랫폼 -->
  <line x1="838" y1="186" x2="650" y2="230" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- ──── 하단: 연구자 등록 흐름 ──── -->
  <text x="24" y="372" fill="#6b7280" font-size="12" font-weight="700">[ 연구자 등록 — URL/파일 자동 추출 ]</text>

  <rect x="24" y="384" width="200" height="78" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="124" y="408" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">연구자</text>
  <text x="124" y="428" fill="#6b7280" font-size="11" text-anchor="middle">데이터 URL/파일 제공</text>
  <text x="124" y="444" fill="#6b7280" font-size="11" text-anchor="middle">"이거 등록해줘"</text>

  <line x1="224" y1="423" x2="258" y2="423" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="258,423 250,418 250,428" fill="#9ca3af"/>

  <!-- 입력 소스 -->
  <rect x="262" y="384" width="200" height="78" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="362" y="408" fill="#0c4a6e" font-size="13" font-weight="700" text-anchor="middle">입력 소스</text>
  <text x="362" y="426" fill="#075985" font-size="10" text-anchor="middle">웹 URL · PDF · DOCX · CSV</text>
  <text x="362" y="442" fill="#075985" font-size="10" text-anchor="middle">DOI · NTIS 과제번호 · arXiv</text>
  <text x="362" y="456" fill="#075985" font-size="10" text-anchor="middle">README · README.md</text>

  <line x1="462" y1="423" x2="496" y2="423" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="496,423 488,418 488,428" fill="#9ca3af"/>

  <!-- 자동 추출 -->
  <rect x="500" y="384" width="200" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="600" y="408" fill="#14532d" font-size="13" font-weight="700" text-anchor="middle">🤖 메타데이터 추출</text>
  <text x="600" y="428" fill="#166534" font-size="11" text-anchor="middle">URL 파싱 · 문서 해석</text>
  <text x="600" y="444" fill="#166534" font-size="11" text-anchor="middle">한/영 자동 병기</text>

  <line x1="700" y1="423" x2="734" y2="423" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="734,423 726,418 726,428" fill="#9ca3af"/>

  <!-- 양식 자동 채움 -->
  <rect x="738" y="384" width="200" height="78" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="838" y="408" fill="#14532d" font-size="13" font-weight="700" text-anchor="middle">등록 양식 자동 채움</text>
  <text x="838" y="426" fill="#166534" font-size="11" text-anchor="middle">신뢰도 표시 + 확인</text>
  <text x="838" y="442" fill="#166534" font-size="11" text-anchor="middle">사용자는 검토만</text>

  <!-- 화살표 above 연구자 → AI 플랫폼 -->
  <line x1="600" y1="384" x2="600" y2="332" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 3"/>

  <!-- 최종 등록 -->
  <rect x="948" y="384" width="128" height="78" rx="8" fill="#fff" stroke="#9ca3af" stroke-width="2"/>
  <text x="1012" y="408" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">DataON</text>
  <text x="1012" y="426" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">자동 검수</text>
  <text x="1012" y="442" fill="#111827" font-size="13" font-weight="700" text-anchor="middle">+ 등록</text>
  <circle cx="1012" cy="455" r="5" fill="#10b981"/>

  <line x1="938" y1="423" x2="948" y2="423" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="948,423 940,418 940,428" fill="#9ca3af"/>

  <!-- Benefit bubble -->
  <rect x="24" y="488" width="1052" height="56" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="44" y="510" fill="#065f46" font-size="12" font-weight="700">✓ 기대 효과</text>
  <text x="114" y="510" fill="#065f46" font-size="12">기관 연계 4주 → 1~2일 · 연구자 입력 시간 30분 → 5분 · 메타데이터 누락률 30% → &lt;5%</text>
  <text x="44" y="528" fill="#065f46" font-size="11">           작업자 노하우 → 에이전트 스킬로 표준화 · 24/7 무인 운영 · 신규 기관 온보딩 자기복제</text>
</svg>
